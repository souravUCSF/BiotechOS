name: keep-alive

# Keeps the free Render demo warm during demo hours (6am–midnight America/Los_Angeles),
# through 2026-07-17 PT. GitHub throttles scheduled runs (often ~hourly), so each run
# self-bridges by pinging every 5 min for ~58 min — giving continuous coverage even if
# only one trigger lands per hour. Delete this file to remove entirely.

on:
  schedule:
    - cron: "*/30 13-23,0-6 * * *"   # attempt every 30 min during UTC 13-23,0-6 (= 6am–midnight PDT)
  workflow_dispatch: {}

concurrency:
  group: keep-alive
  cancel-in-progress: false          # allow overlap so a new run can't leave a gap

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 62
    steps:
      - name: Ping demo every 5 min for ~58 min (6am–midnight PT, through 2026-07-17)
        run: |
          URL="https://biotechos-frontend.onrender.com/tpp-builder"
          END=$(( $(date +%s) + 58*60 ))
          while [ "$(date +%s)" -le "$END" ]; do
            TODAY=$(TZ=America/Los_Angeles date +%F)
            HOUR=$((10#$(TZ=America/Los_Angeles date +%H)))
            if [[ "$TODAY" > "2026-07-17" ]]; then
              echo "Keep-alive window ended (PT $TODAY > 2026-07-17) — stopping."; exit 0
            fi
            if [ "$HOUR" -ge 6 ]; then    # 6am–11:59pm PT
              printf '%s  ' "$(TZ=America/Los_Angeles date '+%F %T %Z')"
              curl -fsS -m 90 -o /dev/null -w "HTTP %{http_code} in %{time_total}s\n" "$URL" \
                || echo "ping failed (site may be cold-starting)"
            else
              echo "$(TZ=America/Los_Angeles date '+%T %Z') outside 6am–midnight PT — idle"
            fi
            sleep 300
          done
