<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>BiotechOS · Evals</title>
<style>
  :root { --bg:#f7f9fb; --panel:#fff; --border:#e2e8f0; --ink:#1e293b; --muted:#64748b;
          --green:#059669; --red:#dc2626; }
  * { box-sizing:border-box; }
  body { margin:0; font:14px/1.5 ui-sans-serif,system-ui,-apple-system,sans-serif;
         background:var(--bg); color:var(--ink); }
  header { position:sticky; top:0; background:var(--panel); border-bottom:1px solid var(--border);
           padding:12px 20px; display:flex; align-items:center; gap:16px; flex-wrap:wrap; z-index:5; }
  h1 { font-size:15px; margin:0; font-weight:600; }
  .tabs { display:flex; gap:4px; }
  .tab { padding:5px 12px; border:1px solid var(--border); border-radius:6px; background:var(--panel);
         cursor:pointer; font-size:13px; }
  .tab.active { background:var(--ink); color:#fff; border-color:var(--ink); }
  .tab .n { opacity:.6; margin-left:5px; }
  button { cursor:pointer; border:1px solid var(--border); border-radius:6px; background:var(--panel);
           padding:6px 12px; font-size:13px; color:var(--ink); }
  button.primary { background:var(--green); color:#fff; border-color:var(--green); }
  button.run { background:var(--ink); color:#fff; border-color:var(--ink); }
  main { display:grid; grid-template-columns:1fr 340px; gap:16px; padding:16px 20px; align-items:start; }
  .cases { display:flex; flex-direction:column; gap:12px; }
  .case { border:1px solid var(--border); border-radius:10px; background:var(--panel); overflow:hidden; }
  .case.pass { border-left:4px solid var(--green); }
  .case.fail { border-left:4px solid var(--red); }
  .case-head { display:flex; align-items:center; gap:10px; padding:8px 12px; background:#fafbfc;
               border-bottom:1px solid var(--border); }
  .case-head input.id { font-weight:600; font-size:13px; border:1px solid transparent; background:transparent;
                        padding:3px 6px; border-radius:5px; width:200px; }
  .case-head input.id:focus { border-color:var(--border); background:#fff; outline:none; }
  .badge { font-size:11px; padding:2px 8px; border-radius:10px; }
  .badge.pass { background:#dcfce7; color:var(--green); }
  .badge.fail { background:#fee2e2; color:var(--red); }
  .form { padding:12px 14px; display:grid; grid-template-columns:170px 1fr; gap:8px 14px; align-items:start; }
  .form label { color:var(--muted); font-size:12px; padding-top:6px; }
  .form .field input[type=text], .form .field input[type=number], .form .field select,
  .form .field textarea { width:100%; border:1px solid var(--border); border-radius:6px; padding:6px 8px;
                          font:13px/1.4 inherit; color:var(--ink); background:#fff; }
  .form .field textarea { resize:vertical; min-height:52px; }
  .hint { color:var(--muted); font-size:11px; margin-top:2px; }
  .toolbar { display:flex; gap:8px; margin-bottom:12px; align-items:center; }
  aside { position:sticky; top:64px; border:1px solid var(--border); border-radius:10px;
          background:var(--panel); padding:14px; max-height:82vh; overflow:auto; }
  .score { display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px solid var(--border); }
  .score .pct { font-variant-numeric:tabular-nums; }
  .fail-detail { font-size:12px; color:#7f1d1d; margin:6px 0 10px; background:#fff5f5;
                 border:1px solid #fecaca; border-radius:6px; padding:8px; }
  .fail-detail b { color:#991b1b; }
  .muted { color:var(--muted); font-size:12px; }
  .del { color:var(--red); border:0; background:none; }
  #msg { font-size:12px; }
  .spinner { width:15px; height:15px; border:2px solid var(--border); border-top-color:var(--ink);
             border-radius:50%; animation:spin .7s linear infinite; display:inline-block; vertical-align:middle; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .overlay { position:fixed; inset:0; background:rgba(247,249,251,.6); backdrop-filter:blur(1px);
             display:none; align-items:center; justify-content:center; z-index:50; }
  .overlay.on { display:flex; }
  .overlay .box { background:var(--panel); border:1px solid var(--border); border-radius:10px;
                  padding:16px 22px; display:flex; gap:12px; align-items:center;
                  box-shadow:0 8px 30px rgba(0,0,0,.10); font-size:14px; }
  .kv { display:grid; grid-template-columns:78px 1fr; gap:2px 8px; margin-top:4px; }
  .kv .k { color:#991b1b; font-weight:600; }
  .kv .ret { color:#7f1d1d; } .kv .exp { color:#065f46; }
</style>
</head>
<body>
<header>
  <h1>BiotechOS · Evals</h1>
  <div class="tabs" id="tabs"></div>
  <span style="flex:1"></span>
  <span id="msg" class="muted"></span>
  <button class="run" onclick="run()">▶ Run all</button>
</header>
<main>
  <div>
    <div class="toolbar">
      <button onclick="addCase()">+ Add case</button>
      <button class="primary" onclick="save()">Save</button>
      <button class="run" onclick="run([suite])">▶ Run this suite</button>
      <span class="muted" id="suitehint"></span>
    </div>
    <div class="cases" id="cases"></div>
  </div>
  <aside id="results"><div class="muted">Run evals to see the scorecard.</div></aside>
</main>
<div class="overlay" id="overlay"><div class="box"><span class="spinner"></span><span id="overlay-msg">Running evals…</span></div></div>
<script>
const API = "/evals/api";
let suite = null, suites = [], cases = [], results = {};

const DOC_TYPES = ["quote","invoice","cro_data","project_update","query","vendor_capability","contract","logistics","other"];
const RECS = ["review_quote","review_data","draft_reply","acknowledge","review_invoice","review_contract","review_logistics"];
// field spec per suite: {k:dot-path, label, t:text|textarea|number|select|list, opts?, hint?}
const FIELDS = {
  qa: [
    {k:"question", label:"Question", t:"text"},
    {k:"reference_answer", label:"Reference answer (gold)", t:"textarea", hint:"The correct answer the judge compares against."},
    {k:"expect_source", label:"Expected source", t:"select", opts:["","facts","documents","none"], hint:"facts = answered from the knowledge base; documents = email search; none = should say ‘not found’."},
    {k:"must_include", label:"Must include", t:"list", hint:"comma-separated — answer must contain all of these"},
    {k:"must_not_include", label:"Must NOT include", t:"list", hint:"comma-separated — answer must contain none of these"},
    {k:"min_citations", label:"Min citations", t:"number"},
    {k:"rubric", label:"Grading notes", t:"textarea"},
  ],
  classify: [
    {k:"doc_subject", label:"Email subject contains", t:"text", hint:"a distinctive part of the email subject"},
    {k:"expect.triage", label:"Expected triage", t:"select", opts:["","actionable","fyi","noise"]},
    {k:"expect.doc_type", label:"Expected type", t:"select", opts:[""].concat(DOC_TYPES)},
  ],
  fields: [
    {k:"doc_subject", label:"Email subject contains", t:"text"},
    {k:"expect.vendor", label:"Vendor", t:"text"},
    {k:"expect.total", label:"Total ($)", t:"number"},
    {k:"expect.cell_lines", label:"Cell lines", t:"list", hint:"comma-separated"},
    {k:"expect.services", label:"Services", t:"list", hint:"comma-separated (e.g. intact_ms, synthesis)"},
    {k:"min_recall", label:"Min recall (0–1)", t:"number"},
  ],
  identity: [
    {k:"token", label:"Token / code", t:"text", hint:"the molecule name/code to resolve"},
    {k:"smiles", label:"SMILES (optional)", t:"text"},
    {k:"expect_status", label:"Expected status", t:"select", opts:["","resolved","inchikey_merge","created","unresolved"]},
    {k:"expect_same_as", label:"Same molecule as (optional)", t:"text", hint:"another token that should resolve to the same molecule"},
  ],
  decision: [
    {k:"doc_subject", label:"Email subject contains", t:"text"},
    {k:"expect_recommendation", label:"Expected recommendation", t:"select", opts:[""].concat(RECS)},
  ],
};
const HINTS = {
  qa:"Ask a question, give the gold answer, and optional must-include/exclude guardrails.",
  classify:"Point at an email and give the expected triage + document type.",
  fields:"Point at an email and give the expected extracted fields.",
  identity:"Give a molecule token and the expected resolution.",
  decision:"Point at an email and give the expected inbox recommendation.",
};

// dot-path helpers
function getP(o,p){ return p.split(".").reduce((x,k)=> (x==null?undefined:x[k]), o); }
function setP(o,p,v){ const ks=p.split("."); let x=o;
  for(let i=0;i<ks.length-1;i++){ if(typeof x[ks[i]]!=="object"||x[ks[i]]==null) x[ks[i]]={}; x=x[ks[i]]; }
  const last=ks[ks.length-1];
  if(v===undefined) delete x[last]; else x[last]=v; }

async function boot(){
  suites = await (await fetch(`${API}/suites`)).json();
  suite = suites[0]?.name; renderTabs(); await loadCases();
}
function renderTabs(){
  document.getElementById("tabs").innerHTML = suites.map(s =>
    `<div class="tab ${s.name===suite?'active':''}" onclick="switchSuite('${s.name}')">${s.name}<span class="n">${s.count}</span></div>`).join("");
}
async function switchSuite(s){ suite=s; renderTabs(); await loadCases(); }

async function loadCases(){
  cases = await (await fetch(`${API}/cases/${suite}`)).json();
  document.getElementById("suitehint").textContent = HINTS[suite]||"";
  render();
}
function render(){
  const spec = FIELDS[suite]||[];
  document.getElementById("cases").innerHTML = cases.map((c,i)=>{
    const r = results[suite]?.[c.id];
    const cls = r===undefined?'':(r.passed?'pass':'fail');
    const badge = r===undefined?'':`<span class="badge ${r.passed?'pass':'fail'}">${r.passed?'pass':'fail'}</span>`;
    const rows = spec.map(f=>{
      const val = getP(c, f.k);
      return `<label>${f.label}</label><div class="field">${input(i,f,val)}${f.hint?`<div class="hint">${f.hint}</div>`:''}</div>`;
    }).join("");
    return `<div class="case ${cls}">
      <div class="case-head">
        <input class="id" value="${esc(c.id||'')}" oninput="setId(${i},this.value)" placeholder="case id"/>
        ${badge}<span style="flex:1"></span>
        <button class="del" onclick="delCase(${i})">delete</button>
      </div>
      <div class="form">${rows}</div>
    </div>`;
  }).join("") || `<div class="muted">No cases yet — click “+ Add case”.</div>`;
}
function input(i,f,val){
  const oi = `oninput="upd(${i},'${f.k}','${f.t}',this.value)"`;
  const oc = `onchange="upd(${i},'${f.k}','${f.t}',this.value)"`;
  if(f.t==="textarea") return `<textarea ${oi}>${esc(val??"")}</textarea>`;
  if(f.t==="number") return `<input type="number" step="any" value="${val??""}" ${oi}/>`;
  if(f.t==="list"){ const s = Array.isArray(val)? val.join(", ") : (val??""); return `<input type="text" value="${esc(s)}" ${oi}/>`; }
  if(f.t==="select") return `<select ${oc}>`+ f.opts.map(o=>`<option value="${o}" ${o===(val??"")?"selected":""}>${o||"—"}</option>`).join("") +`</select>`;
  return `<input type="text" value="${esc(val??"")}" ${oi}/>`;
}
function upd(i,key,type,raw){
  let v = raw;
  if(type==="number"){ v = raw===""? undefined : Number(raw); }
  else if(type==="list"){ v = raw.split(",").map(x=>x.trim()).filter(Boolean); }
  else if(type==="select"){ v = raw===""? undefined : raw; }
  setP(cases[i], key, v);
}
function setId(i,v){ cases[i].id = v; }
function addCase(){ const t = FIELDS[suite]; const c = {id:`${suite}-new`};
  // seed nested defaults
  if(suite==="classify") c.expect={triage:"actionable",doc_type:"quote"};
  if(suite==="fields"){ c.expect={vendor:"",services:[]}; c.min_recall=1.0; }
  if(suite==="identity") c.expect_status="resolved";
  if(suite==="decision") c.expect_recommendation="review_quote";
  if(suite==="qa"){ c.expect_source="facts"; c.must_include=[]; c.min_citations=1; }
  cases.unshift(c); render();                     // new case goes on top
  window.scrollTo({top:0, behavior:"smooth"});
  const idInput = document.querySelector("#cases .case .id"); if(idInput){ idInput.focus(); idInput.select(); }
}
function delCase(i){ cases.splice(i,1); render(); }
async function save(){
  const r = await fetch(`${API}/cases/${suite}`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(cases)});
  if(r.ok){ const d=await r.json(); msg(`saved ${d.saved} cases`); const t=suites.find(s=>s.name===suite); if(t)t.count=d.saved; renderTabs(); }
  else msg("save failed: "+(await r.text()), true);
}
function setRunning(on, text){
  const o=document.getElementById("overlay"); o.classList.toggle("on", on);
  if(text) document.getElementById("overlay-msg").textContent=text;
  document.querySelectorAll("button.run, button.primary").forEach(b=>b.disabled=on);
}
async function run(which){
  const label = which ? `Running “${which[0]}” (the judge may take a moment)…` : "Running all suites (the judge may take a moment)…";
  setRunning(true, label); msg("running…");
  try {
    await save();
    const r = await fetch(`${API}/run`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(which?{suites:which}:{})});
    if(!r.ok){ msg("run failed: "+(await r.text()), true); return; }
    const rep = await r.json(); results={};
    for(const s of rep.suites){ results[s.suite]={}; for(const res of s.results) results[s.suite][res.id]=res; }
    renderResults(rep); render(); msg("done");
  } catch(e){ msg("run failed: "+e.message, true); }
  finally { setRunning(false); }
}
function renderResults(rep){
  const el = document.getElementById("results");
  el.innerHTML = "<div style='font-weight:600;margin-bottom:8px'>Scorecard</div>" + rep.suites.map(s=>{
    const pct = s.pass_rate==null?'—':Math.round(s.pass_rate*100)+'%';
    const fails = s.results.filter(r=>!r.passed);
    return `<div class="score"><span>${s.suite}</span><span class="pct">${s.passed}/${s.total} · ${pct}</span></div>` +
      fails.map(f=>`<div class="fail-detail"><b>✗ ${f.id}</b><br>${readable(f.detail)}</div>`).join("");
  }).join("");
}
// render a returned-vs-expected block that reads clearly
function kv(label, ret, exp){
  return `<div class="kv"><span class="k">${esc(label)}</span><span></span>`+
         (ret!==undefined?`<span class="ret">returned</span><span class="ret">${esc(ret)}</span>`:"")+
         (exp!==undefined?`<span class="exp">expected</span><span class="exp">${esc(exp)}</span>`:"")+
         `</div>`;
}
function readable(d){
  if(d.error) return `<span class="ret">error: ${esc(d.error)}</span>`;
  const out=[];
  // qa
  if(d.returned!==undefined) out.push(kv("Answer", d.returned, d.reference||"(see reference)"));
  if(d.missing_include?.length) out.push(kv("Missing", "(absent) "+d.missing_include.join(", "), d.expected_include?.join(", ")));
  if(d.must_not_violations?.length) out.push(kv("Forbidden", d.must_not_violations.join(", ")+" (present)", "none of these"));
  if(d.source_ok===false) out.push(kv("Source", d.source, d.expected_source));
  if(d.citations_ok===false) out.push(kv("Citations", String(d.citations), "≥ required"));
  if(d.judge_score!=null && d.judge) out.push(kv("Judge", `${d.judge_score} — ${String(d.judge).slice(0,160)}`));
  // classify / fields / decision / identity: (got, expected) tuples
  const LBL={triage:"Triage",doc_type:"Doc type",vendor:"Vendor",total:"Total",
             recommendation:"Recommendation",status:"Status",same_as:"Same molecule"};
  for(const k of Object.keys(LBL)) if(Array.isArray(d[k])) out.push(kv(LBL[k], fmt(d[k][0]), fmt(d[k][1])));
  for(const k of ["cell_lines","services"]) if(d[k]?.missing?.length)
    out.push(kv(k==="cell_lines"?"Cell lines":"Services", "missing "+d[k].missing.join(", "), "all present"));
  return out.join("") || "(see run for details)";
}
function fmt(v){ return v===null||v===undefined? "—" : (typeof v==="boolean"? (v?"yes":"no") : String(v)); }
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function msg(t,err){ const m=document.getElementById("msg"); m.textContent=t; m.style.color=err?'var(--red)':'var(--muted)'; }
boot();
</script>
</body>
</html>
